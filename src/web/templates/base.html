<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#17140F">
    <meta name="color-scheme" content="dark">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="{{ t.app_name }}">
    <title>{% block title %}{{ t.app_name }}{% endblock %}</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- HTMX (lokal gehostet, kein CDN — funktioniert offline/in der PWA) -->
    <script src="/static/js/htmx.min.js" defer></script>
    {% block head %}{% endblock %}
</head>
<body data-page="{{ page }}">
    <div class="app-layout">
        <header class="topbar">
            <a href="/" class="brand">
                <img src="/static/logo-cream.png" alt="" class="brand-logo" width="28" height="28">
                <span class="brand-name">{{ t.app_name }}</span>
            </a>
            <div class="lang-switch" role="group" aria-label="{{ t.common.language }}">
                <a href="/set-lang/de" class="lang-btn {% if lang == 'de' %}active{% endif %}">DE</a>
                <a href="/set-lang/en" class="lang-btn {% if lang == 'en' %}active{% endif %}">EN</a>
            </div>
        </header>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

        <!-- Bottom-Nav: echte Routen (Dashboard, Plan, Ziele, Profil, Settings) -->
        <nav class="bottom-nav" aria-label="{{ t.app_name }}">
            <a href="/" class="nav-item {% if page == 'dashboard' %}active{% endif %}"
               {% if page == 'dashboard' %}aria-current="page"{% endif %}>
                <span class="nav-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:block"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></span><span class="nav-label">{{ t.nav.dashboard }}</span>
            </a>
            <a href="/plan" class="nav-item {% if page == 'plan' %}active{% endif %}"
               {% if page == 'plan' %}aria-current="page"{% endif %}>
                <span class="nav-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:block"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="m9 16 2 2 4-4"/></svg></span><span class="nav-label">{{ t.nav.plan }}</span>
            </a>
            <a href="/goals" class="nav-item {% if page == 'goals' %}active{% endif %}"
               {% if page == 'goals' %}aria-current="page"{% endif %}>
                <span class="nav-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:block"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></span><span class="nav-label">{{ t.nav.goals }}</span>
            </a>
            <a href="/profile" class="nav-item {% if page == 'profile' %}active{% endif %}"
               {% if page == 'profile' %}aria-current="page"{% endif %}>
                <span class="nav-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:block"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><span class="nav-label">{{ t.nav.profile }}</span>
            </a>
            <a href="/settings" class="nav-item {% if page == 'settings' %}active{% endif %}"
               {% if page == 'settings' %}aria-current="page"{% endif %}>
                <span class="nav-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:block"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></span><span class="nav-label">{{ t.nav.settings }}</span>
            </a>
        </nav>
    </div>

    {% block scripts %}{% endblock %}
    <script>
      // PWA: Service Worker registrieren (still scheitern, falls nicht verfügbar).
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(
            (err) => console.warn('Service Worker registration failed:', err)
          );
        });
      }
    </script>
</body>
</html>
