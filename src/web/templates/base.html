<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d0f12">
    <meta name="color-scheme" content="dark">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="{{ t.app_name }}">
    <title>{% block title %}{{ t.app_name }}{% endblock %}</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" type="image/svg+xml" href="/static/icon.svg">
    <link rel="apple-touch-icon" href="/static/icon.svg">
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body data-page="{{ page }}">
    <div class="app-layout">
        <header class="topbar">
            <a href="/" class="brand">
                <img src="/static/icon.svg" alt="" class="brand-logo" width="28" height="28">
                <span class="brand-name">{{ t.app_name }}</span>
            </a>
            <div class="lang-switch" role="group" aria-label="{{ t.common.language }}">
                <a href="/set-lang/de" class="lang-btn {% if lang == 'de' %}active{% endif %}">DE</a>
                <a href="/set-lang/en" class="lang-btn {% if lang == 'en' %}active{% endif %}">EN</a>
            </div>
        </header>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

        <!-- Bottom-Nav-Platzhalter — Routen folgen in Phase 1+ -->
        <nav class="bottom-nav" aria-label="{{ t.app_name }}">
            <a href="/" class="nav-item {% if page == 'dashboard' %}active{% endif %}">
                <span class="nav-icon">◎</span><span class="nav-label">{{ t.nav.dashboard }}</span>
            </a>
            <span class="nav-item disabled"><span class="nav-icon">▤</span><span class="nav-label">{{ t.nav.plan }}</span></span>
            <span class="nav-item disabled"><span class="nav-icon">♡</span><span class="nav-label">{{ t.nav.health }}</span></span>
            <span class="nav-item disabled"><span class="nav-icon">◇</span><span class="nav-label">{{ t.nav.goals }}</span></span>
            <span class="nav-item disabled"><span class="nav-icon">✦</span><span class="nav-label">{{ t.nav.chat }}</span></span>
        </nav>
    </div>

    {% block scripts %}{% endblock %}
    <script>
      // PWA: Service Worker registrieren (still scheitern, falls nicht verfügbar).
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(
            (err) => console.warn('Service Worker registration failed:', err)
          );
        });
      }
    </script>
</body>
</html>
